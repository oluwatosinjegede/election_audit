<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Election Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-xl">

    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">
        Election Audit System
    </h1>

    <p class="text-gray-500 text-center mb-6">
        Upload voters register and votes cast files to begin audit
    </p>

    <!-- ERROR DISPLAY -->
    {% if error %}
    <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <!-- FORM -->
    <form method="post" enctype="multipart/form-data" class="space-y-5" id="auditForm">
        {% csrf_token %}

        <!-- VOTERS REGISTER -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
                Voters Register (CSV)
            </label>
            <input type="file" name="voters_register" required
                class="w-full border rounded-lg p-2 bg-gray-50">
        </div>

        <!-- VOTES CAST -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
                Votes Cast (CSV)
            </label>
            <input type="file" name="vote_cast" required
                class="w-full border rounded-lg p-2 bg-gray-50">
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" id="submitBtn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200">
            Run Audit
        </button>

        <!-- LOADING TEXT -->
        <p id="loadingText" class="text-center text-sm text-gray-500 hidden">
            Processing... please wait
        </p>

    </form>

</div>

<!-- JS FOR UX (IMPORTANT) -->
<script>
    const form = document.getElementById('auditForm');
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loadingText');

    form.addEventListener('submit', function () {
        btn.disabled = true;
        btn.innerText = "Processing...";
        loading.classList.remove("hidden");
    });
</script>

</body>
</html>
